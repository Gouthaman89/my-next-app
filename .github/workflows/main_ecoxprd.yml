name: Build and deploy Next.js app to Azure Web App - icxprd

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24.x'

      - name: Install deps
        run: npm ci

      - name: Build (standalone)
        run: npm run build

      - name: Create release folder from standalone output
        run: |
          rm -rf release
          mkdir -p release/.next
          # Copy the standalone server (includes node_modules and server.js)
          cp -R .next/standalone/* release/
          # Copy static assets and (optionally) public
          cp -R .next/static release/.next/static
          if [ -d public ]; then cp -R public release/public; fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: release
          path: release

  deploy:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: release
          path: release

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'ecoxprd'
          slot-name: 'Production'
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_A7898031242E4DB3AA6EAC8C4E1D6BBC }}
          package: release

