# Docs: https://github.com/Azure/webapps-deploy
name: Build and deploy Next.js app to Azure Web App - icxprd

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: '22.x'   # OK for Next 15/React 19; >=18.18 also fine

      - name: Install deps
        run: |
          npm install

      - name: Build (standalone)
        env:
          NEXT_TELEMETRY_DISABLED: 1
        run: |
          npm run build
          # Create minimal runtime bundle for Azure
          rm -rf release
          mkdir -p release/.next
          # copy everything from standalone (includes server.js + node_modules)
          cp -R .next/standalone/* release/
          # static assets + public
          cp -R .next/static release/.next/
          if [ -d public ]; then cp -R public release/public; fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: nextjs-standalone
          path: release

  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: nextjs-standalone
          path: .

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'icxprd'
          slot-name: 'Production'
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_50C11AE1765940BE82E6BFCA42678516 }}
          package: .'


